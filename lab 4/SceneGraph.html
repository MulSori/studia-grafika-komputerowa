<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Subroutine Hierarchy - Poprawiona Belka</title>
    <style>
        body { background-color: #eee; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        canvas { background-color: white; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .controls { margin: 15px; padding: 10px; background: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="controls">
        <label><input type="checkbox" id="animCheck"> Uruchom Animację</label>
    </div>

    <canvas id="mainCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("mainCanvas");
        const ctx = canvas.getContext("2d");
        const animCheck = document.getElementById("animCheck");

        let frameNumber = 0;
        let pixelSize = 1;

        function filledTriangle(g) {
            g.beginPath();
            g.moveTo(-0.5, 0);
            g.lineTo(0.5, 0);
            g.lineTo(0, 1);
            g.closePath();
            g.fill();
        }

        function filledRect(g) {
            g.fillRect(-0.5, -0.5, 1, 1);
        }

        function regularHeptagon(g) {
            const sides = 7;
            g.beginPath();
            for (let i = 0; i < sides; i++) {
                let angle = (Math.PI * 2 / sides) * i;
                let x = 0.5 * Math.cos(angle);
                let y = 0.5 * Math.sin(angle);
                if (i === 0) g.moveTo(x, y);
                else g.lineTo(x, y);
            }
            g.closePath();
            g.stroke();

            for (let i = 0; i < sides; i++) {
                let angle = (Math.PI * 2 / sides) * i;
                g.beginPath();
                g.moveTo(0, 0);
                g.lineTo(0.5 * Math.cos(angle), 0.5 * Math.sin(angle));
                g.stroke();
            }
        }


        function drawPropeller(g) {
            g.save();
                g.fillStyle = "red";
                g.save();
                    g.scale(2.2, 0.15);
                    filledRect(g);
                g.restore();

                g.strokeStyle = "black";
                g.lineWidth = pixelSize; 

                g.save();
                    g.translate(-1.1, 0); 
                    g.rotate(frameNumber * 0.05);
                    regularHeptagon(g);
                g.restore();

                g.save();
                    g.translate(1.1, 0); 
                    g.rotate(frameNumber * 0.05); 
                    regularHeptagon(g);
                g.restore();
            g.restore();
        }

        function drawUnit(g, x, y, scale, color) {
            g.save();
                g.translate(x, y);
                g.scale(scale, scale);

                g.fillStyle = color;
                g.save();
                    g.translate(0, -2);
                    g.scale(0.6, 2.0);
                    filledTriangle(g);
                g.restore();

                drawPropeller(g);
            g.restore();
        }

        function applyLimits(g, xleft, xright, ytop, ybottom) {
            const width = canvas.width;
            const height = canvas.height;
            g.scale(width / (xright - xleft), height / (ybottom - ytop));
            g.translate(-xleft, -ytop);
            pixelSize = Math.abs((xright - xleft) / width);
        }

        function draw() {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            applyLimits(ctx, -4, 4, 3, -3);

            drawUnit(ctx, -2.5, 1.2, 0.5, "purple");
            drawUnit(ctx, 0.2, -1.0, 0.8, "blue");
            drawUnit(ctx, 2.2, 1.5, 0.4, "green");

            if (animCheck.checked) {
                frameNumber++;
            }
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
